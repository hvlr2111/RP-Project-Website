<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - DTIF Project</title>
    <meta name="description" content="Contact the DTIF research team for inquiries and information.">
    <link rel="stylesheet" href="../css/style.css">

</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">
                <a href="../index.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                    <span>DTIF</span> Project
                </a>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="domain.html">Domain</a></li>
                    <li><a href="milestones.html">Milestones</a></li>
                    <li><a href="documents.html">Documents</a></li>
                    <li><a href="about.html">About us</a></li>
                    <li><a href="contact.html" class="active">Contact us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero" style="padding: 5rem 2rem; background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('../images/Hikkaduwa.jpg') center/cover no-repeat;">
            <div class="hero-content">
                <h1>Contact Us</h1>
                <p>Have questions about the DTIF architecture? Reach out to our research team.</p>
            </div>
        </section>

        <section class="container">
            <div class="contact-wrapper">
                


                <!-- Contact Form -->
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem; color: var(--deep-navy);">Send an Inquiry</h2>
                    <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Thank you for your inquiry! This is a static frontend demo.');">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
                        </div>

                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <select id="subject" name="subject" class="form-control" required>
                                <option value="">Select a subject...</option>
                                <option value="general">General Inquiry</option>
                                <option value="research">Research Methodology</option>
                                <option value="collaboration">Collaboration</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" class="form-control" required placeholder="How can we help you?"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    </form>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <div class="container" style="padding: 1rem 2rem;">
            <p>&copy; 2026 DTIF Project. SLIIT Department of Data Science.</p>
        </div>
    </footer>
</body>
</html>
